services:
  postgres:
    image: postgres:16-alpine
    container_name: ferro-io-test-postgres
    environment:
      POSTGRES_USER: ferro_io
      POSTGRES_PASSWORD: ferro_io
      POSTGRES_DB: ferro_io
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferro_io -d ferro_io"]
      interval: 2s
      timeout: 3s
      retries: 15
